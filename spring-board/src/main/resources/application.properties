# [기본] 애플리케이션 이름 설정
spring.application.name=spring-board

# [추가] DevTools LiveReload 활성화 — 코드 수정 시 브라우저 자동 새로고침
spring.devtools.livereload.enabled=true


# [추가] 로그 레벨 설정 — 우리 패키지에서 DEBUG 이상 로그를 콘솔에 출력
# 레벨 순서: TRACE < DEBUG < INFO < WARN < ERROR (낮을수록 더 많이 출력)
# log.debug() 가 콘솔에 찍히려면 DEBUG 이상이어야 함
logging.level.net.likelion.bebc25=DEBUG

# [추가] MySQL DB 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/board_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# [추가] 앱 시작할 때 schema.sql, data.sql 자동 실행
# always  : 매번 실행
# never   : 실행 안 함
# embedded: H2 같은 내장 DB일 때만 실행 (기본값)
spring.sql.init.mode=always
