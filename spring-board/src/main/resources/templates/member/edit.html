<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원 정보 수정 및 탈퇴</title>
  <link rel="stylesheet" href="/board/css/common.css">
  <link rel="stylesheet" href="/board/css/write.css">
  <link rel="stylesheet" href="/board/css/list.css">
  <style>
    input[type="password"], input[type="email"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>회원 정보 수정</h1>
    <form action="/member/edit" method="post">
      <input type="hidden" name="id" value="1">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" value="haru" readonly>
      </div>
      <div class="form-group">
        <label for="password">새 비밀번호</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" value="user1@example.com">
      </div>
      <div class="form-group">
        <button type="submit" class="btn">수정하기</button>
        <a href="list.html" class="btn btn-secondary">목록으로</a>
      </div>
    </form>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h1>회원 탈퇴</h1>
    <form action="/member/withdraw" method="post">
      <input type="hidden" name="id" value="1">
      <div class="form-group">
        <button type="submit" class="btn btn-danger" onclick="return confirm('정말로 탈퇴하시겠습니까?');">탈퇴하기</button>
      </div>
    </form>
  </div>
</body>
</html>
