<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스프링 게시판 - 글 수정하기</title>
  <link rel="stylesheet" href="/board/css/common.css">
  <link rel="stylesheet" href="/board/css/write.css">
</head>
<body>
  <div class="container">
    <h1>게시글 수정</h1>
    <div class="nav">
      <a href="list.html">목록으로</a>
      <a href="write.html">새 글 쓰기</a>
    </div>

    <form th:action="@{edit}" method="POST">
      <input type="hidden" name="id" th:value="${post.id}">

      <div class="form-group">
        <label for="title">제목</label>
        <input type="text" id="title" name="title" th:value="${post.title}" required>
      </div>

      <div class="form-group">
        <label for="author">작성자</label>
        <input type="text" id="author" name="author" th:value="${post.author}" required>
      </div>

      <div class="form-group">
        <label for="content">내용</label>
        <textarea id="content" name="content" rows="10" required th:text="${post.content}"></textarea>
      </div>

      <div style="margin-top: 20px;">
        <button type="submit" class="btn">수정</button>
        <a th:href="@{detail.html(id=${post.id})}" class="btn btn-secondary">취소</a>
      </div>
    </form>
  </div>
</body>
</html>
